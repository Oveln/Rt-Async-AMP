# k3-flash 配置。本文件由 k3-flash.sh 自动 source。
# 环境变量优先级高于本文件 —— 命令行里 K3_MAIN_UART=... ./k3-flash.sh 也行。
#
# 本脚本是自包含的：rcpu0 ELF、dtb、null.spacemit、ITS 模板都在 scripts/flash/
# 下，不依赖 esos 仓库或 output/esos/。这里只需配置串口。

# ── 串口 ────────────────────────────────────────────────────────────────────
# 主 UART：U-Boot 控制台（fastboot / mtd 命令、reset）
export K3_MAIN_UART=/dev/tty.usbmodem62B68F06E7BF1
# RUART：rt-async 固件日志输出（当前脚本未使用，留作 tail-log 调试用）
export K3_RUART=/dev/tty.usbserial-114120
export K3_BAUD=115200
# U-Boot 提示符
export K3_UBOOT_PROMPT="=>"
# autoboot 倒计时正则（匹配到就发 s 中断）；窗口极短时还有周期发 s 兜底
export K3_AUTOBOOT_RE="stop autoboot|Hit any key|autoboot"

# loadaddr 由 U-Boot 自己的环境变量 $loadaddr 决定（脚本发字面字符串
# "$loadaddr" 由 U-Boot 展开），无需在此配置。查看板子当前值：=> printenv loadaddr
